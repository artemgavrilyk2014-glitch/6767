<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MTA Server Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #030712;
    --surface:  #0d1117;
    --card:     #111827;
    --border:   #1f2937;
    --muted:    #374151;
    --text:     #e5e7eb;
    --sub:      #9ca3af;
    --dim:      #6b7280;
    --green:    #4ade80;
    --blue:     #3b82f6;
    --indigo:   #818cf8;
    --yellow:   #facc15;
    --orange:   #fb923c;
    --red:      #f87171;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; overflow: hidden; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
  input, button, select { font-family: inherit; font-size: 13px; }
  button { cursor: pointer; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ── Titlebar (drag region) ── */
  #titlebar {
    -webkit-app-region: drag;
    background: #080e19;
    border-bottom: 1px solid var(--border);
    height: 38px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    flex-shrink: 0;
    user-select: none;
  }
  #titlebar .logo { display: flex; align-items: center; gap: 9px; }
  #titlebar .logo-icon { width: 22px; height: 22px; background: linear-gradient(135deg,#1d4ed8,#7c3aed); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  #titlebar .logo-text { font-weight: 700; font-size: 13px; color: var(--text); letter-spacing: .3px; }
  #titlebar .spacer { flex: 1; }
  #titlebar .server-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--dim); }
  #titlebar .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .dot-red   { background: var(--red); }
  #titlebar .win-btns { -webkit-app-region: no-drag; display: flex; gap: 6px; margin-left: 16px; }
  .win-btn { width: 28px; height: 22px; border: none; border-radius: 5px; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  #btn-min  { background: #1f2937; color: var(--sub); } #btn-min:hover  { background: var(--muted); }
  #btn-max  { background: #1f2937; color: var(--sub); } #btn-max:hover  { background: var(--muted); }
  #btn-close{ background: #1f2937; color: var(--red); } #btn-close:hover{ background: #7f1d1d; }

  /* ── Connect bar ── */
  #connect-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #connect-bar input { background: var(--card); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 7px 10px; }
  #connect-bar input:focus { outline: none; border-color: var(--blue); }
  #inp-host { width: 200px; }
  #inp-port { width: 80px; }
  #inp-pass { width: 160px; }
  .btn { border: none; border-radius: 7px; padding: 7px 16px; font-weight: 700; transition: filter .15s; }
  .btn:hover { filter: brightness(1.15); }
  .btn-blue   { background: var(--blue); color: #fff; }
  .btn-green  { background: #16a34a; color: #fff; }
  .btn-red    { background: #dc2626; color: #fff; }
  .btn-muted  { background: var(--muted); color: var(--sub); }

  /* ── Stat row ── */
  #stat-row { display: flex; gap: 8px; padding: 10px 16px; flex-shrink: 0; flex-wrap: wrap; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: 10px 16px; flex: 1 1 120px; min-width: 110px; }
  .stat-label { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 800; }

  /* ── Tabs ── */
  #tabs { display: flex; gap: 3px; padding: 0 16px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
  .tab-btn { background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--dim); padding: 9px 16px; font-size: 12px; font-weight: 600; transition: color .15s, border-color .15s; letter-spacing: .3px; display: flex; align-items: center; gap: 6px; }
  .tab-btn:hover { color: var(--sub); }
  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* ── Content ── */
  #content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .tab-panel { display: none; flex: 1; overflow: auto; padding: 14px 16px; flex-direction: column; gap: 12px; }
  .tab-panel.active { display: flex; }

  /* ── Table ── */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th { text-align: left; color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .7px; padding: 6px 10px; border-bottom: 1px solid var(--border); font-weight: 600; }
  .data-table td { padding: 9px 10px; border-bottom: 1px solid #1f293744; vertical-align: middle; }
  .data-table tr:hover td { background: #ffffff05; }

  /* ── Console ── */
  #console-log { background: #050a12; border: 1px solid var(--border); border-radius: 9px; padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 12px; flex: 1; overflow-y: auto; min-height: 200px; max-height: 480px; }
  .log-line { margin-bottom: 2px; line-height: 1.6; }
  .log-time { color: var(--muted); margin-right: 8px; }
  .log-info { color: var(--sub); }
  .log-join { color: var(--green); }
  .log-warn { color: var(--yellow); }
  .log-error { color: var(--red); }
  .log-cmd  { color: var(--blue); }
  #console-input-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  #console-prompt { color: var(--green); font-family: 'JetBrains Mono', monospace; font-size: 16px; }
  #console-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 8px 12px; }
  #console-input:focus { outline: none; border-color: var(--green); }

  /* ── Resource cards ── */
  .res-card { background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .res-name { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text); }
  .res-actions { display: flex; gap: 6px; }
  .badge { border-radius: 5px; padding: 2px 8px; font-size: 11px; font-weight: 700; }

  /* ── Modal ── */
  #modal-overlay { position: fixed; inset: 0; background: #000b; display: none; align-items: center; justify-content: center; z-index: 200; }
  #modal-overlay.open { display: flex; }
  #modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 26px; width: 340px; max-width: 94vw; }
  #modal h3 { font-size: 15px; font-weight: 800; margin-bottom: 14px; }
  #modal input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 8px 11px; margin-bottom: 12px; }
  #modal input:focus { outline: none; border-color: var(--blue); }
  #modal .modal-btns { display: flex; gap: 8px; }
  #modal .modal-btns button { flex: 1; padding: 9px; }

  /* ── Toolbar row ── */
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .toolbar input { background: var(--card); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 7px 10px; flex: 1 1 160px; }
  .toolbar input:focus { outline: none; border-color: var(--blue); }

  /* ── Loading ── */
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--dim); gap: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--muted); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }

  /* ── Ping indicator ── */
  .ping-good { color: #4ade80; } .ping-ok { color: #facc15; } .ping-bad { color: #f87171; }

  /* ── Empty state ── */
  .empty { color: var(--dim); text-align: center; padding: 30px; }
</style>
</head>
<body>
<div id="app">

  <!-- Titlebar -->
  <div id="titlebar">
    <div class="logo">
      <div class="logo-icon">🎮</div>
      <span class="logo-text">MTA Server Manager</span>
    </div>
    <div class="spacer"></div>
    <div class="server-badge">
      <div class="dot dot-red" id="status-dot"></div>
      <span id="status-text">Не підключено</span>
    </div>
    <div class="win-btns">
      <button class="win-btn" id="btn-min">─</button>
      <button class="win-btn" id="btn-max">□</button>
      <button class="win-btn" id="btn-close">✕</button>
    </div>
  </div>

  <!-- Connect bar -->
  <div id="connect-bar">
    <input id="inp-host" placeholder="IP сервера" value="127.0.0.1"/>
    <input id="inp-port" placeholder="Порт API" value="22005"/>
    <input id="inp-pass" type="password" placeholder="Пароль API"/>
    <button class="btn btn-blue" id="btn-connect">🔌 Підключитись</button>
    <button class="btn btn-muted" id="btn-disconnect" style="display:none">Відключитись</button>
    <button class="btn btn-green" id="btn-broadcast" style="display:none;margin-left:auto">📢 Broadcast</button>
  </div>

  <!-- Stats -->
  <div id="stat-row">
    <div class="stat-card">
      <div class="stat-label">Гравці</div>
      <div class="stat-value" id="s-players" style="color:#4ade80">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Пінг</div>
      <div class="stat-value" id="s-ping" style="color:#4ade80">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Аптайм</div>
      <div class="stat-value" id="s-uptime" style="color:#818cf8;font-size:16px">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Сервер</div>
      <div class="stat-value" id="s-name" style="color:#9ca3af;font-size:14px;font-family:Inter">—</div>
    </div>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <button class="tab-btn active" data-tab="players">👥 Гравці</button>
    <button class="tab-btn" data-tab="resources">📦 Ресурси</button>
    <button class="tab-btn" data-tab="console">💻 Консоль</button>
    <button class="tab-btn" data-tab="stats">📊 Статистика</button>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- Players -->
    <div class="tab-panel active" id="tab-players">
      <div class="toolbar">
        <input id="player-search" placeholder="🔍 Пошук гравця..."/>
        <button class="btn btn-blue" onclick="refreshPlayers()">↺ Оновити</button>
      </div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr>
              <th>Гравець</th>
              <th>Пінг</th>
              <th>Очки</th>
              <th>Час</th>
              <th>Аккаунт</th>
              <th style="text-align:right">Дії</th>
            </tr>
          </thead>
          <tbody id="players-tbody">
            <tr><td colspan="6" class="empty">Не підключено до сервера</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Resources -->
    <div class="tab-panel" id="tab-resources">
      <div class="toolbar">
        <input id="res-search" placeholder="🔍 Пошук ресурсу..."/>
        <button class="btn btn-blue" onclick="refreshResources()">↺ Оновити</button>
      </div>
      <div id="resources-list"><div class="loading"><div class="spinner"></div> Не підключено</div></div>
    </div>

    <!-- Console -->
    <div class="tab-panel" id="tab-console">
      <div id="console-log"></div>
      <div id="console-input-row">
        <span id="console-prompt">❯</span>
        <input id="console-input" placeholder="Введіть команду для сервера..."/>
        <button class="btn btn-green" id="console-send">Виконати</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="tab-panel" id="tab-stats">
      <div id="stats-content" style="color:var(--dim);text-align:center;padding:40px">Підключіться до сервера для перегляду статистики</div>
    </div>

  </div>
</div>

<!-- Modal (ban) -->
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title" style="color:#f87171">🚫 Бан гравця</h3>
    <div id="modal-player-name" style="color:var(--sub);margin-bottom:12px;font-size:13px"></div>
    <input id="modal-reason" placeholder="Причина бану..."/>
    <input id="modal-days" type="number" placeholder="Днів бану (0 = назавжди)" min="0" value="1"/>
    <div class="modal-btns">
      <button class="btn btn-red" id="modal-confirm">Забанити</button>
      <button class="btn btn-muted" id="modal-cancel">Скасувати</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
